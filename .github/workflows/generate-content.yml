name: Generate Content

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type'
        required: true
        type: choice
        options:
          - activities
          - blog
          - both
      phonemes:
        description: 'Phonemes (comma-separated, or "all")'
        required: false
        default: 'all'
      blog_topic:
        description: 'Blog topic (for blog type)'
        required: false

  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC

jobs:
  generate-activities:
    if: ${{ github.event.inputs.type == 'activities' || github.event.inputs.type == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Generate activities
        env:
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_REVIEWER_CHAT_ID: ${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}
        run: npx tsx scripts/generate-content.ts activities "${{ github.event.inputs.phonemes || 'r,s,l' }}"

      - name: Sync S3 activities to DB
        run: |
          curl -s -X POST \
            "${{ secrets.APP_URL }}/api/admin/sync-activities" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
            --connect-timeout 10 --max-time 60

  generate-blog:
    if: ${{ github.event.inputs.type == 'blog' || github.event.inputs.type == 'both' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Generate blog post
        env:
          GOOGLE_CLOUD_API_KEY: ${{ secrets.GOOGLE_CLOUD_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_REVIEWER_CHAT_ID: ${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}
        run: npx tsx scripts/generate-content.ts blog "${{ github.event.inputs.blog_topic || '' }}"

      - name: Commit blog post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/blog/posts/
          git diff --staged --quiet || git commit -m "feat(blog): auto-generated post"
          git push
